# GitHub Actions 워크플로 — 리포지토리의 .github/workflows/publish.yml 로 복사해서 사용
# 30분 간격 수집·생성·커밋 → Cloudflare Workers Static Assets 배포 (전 구간 무료)
#
# ── 보안 원칙 (automation/SECURITY.md 참조) ──────────────────────────
#  1. 서드파티 액션 0개 — GitHub 공식(actions/*)만, 그것도 커밋 SHA로 고정
#     (2025년 tj-actions/changed-files 공급망 해킹이 "태그 바꿔치기" 방식이었음)
#  2. 권한 최소화 — 기본 권한 없음, 필요한 job에만 contents: write
#  3. 트리거는 schedule/workflow_dispatch만 — 외부 PR이 시크릿에 접근할 경로 차단
#  4. 외부 입력(${{ github.event.* }})을 run: 에 절대 보간하지 않음 (스크립트 인젝션 차단)
# ─────────────────────────────────────────────────────────────────────
name: superstock-auto-publish

on:
  schedule:
    - cron: "*/30 * * * *"   # 30분마다 (UTC; 수 분 지연 가능)
  workflow_dispatch:          # 수동 실행 버튼

# 기본: 아무 권한도 주지 않는다
permissions: {}

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write         # 이 job만, 커밋 푸시에 필요한 최소 권한
    steps:
      # actions/checkout v5.0.0 — 태그가 아니라 커밋 SHA로 고정
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5

      # actions/setup-python v5 — 커밋 SHA로 고정
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: 수집·생성·검수
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        # 표준 라이브러리만 사용 — pip install 없음(공급망 축소).
        # 의존성이 필요해지면: requirements.txt + `pip install --require-hashes`
        run: python automation/collect_and_publish.py

      - name: WP 새 글 동기화 + 재작성 + 사이트 재생성
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          python automation/sync_wp.py
          python automation/rewrite_posts.py
          python automation/build_site.py

      - name: 커밋 (변경분 있을 때만)
        run: |
          git config user.name "superstock-bot"
          git config user.email "bot@superstock.blog"
          git add -A
          git diff --cached --quiet || git commit -m "auto: $(date -u +%Y-%m-%dT%H:%M)Z 회차 발행"
          git push

      - name: Cloudflare Workers 배포 (토큰 등록 전이면 건너뜀)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}   # 이 프로젝트 1개로만 스코프 제한한 토큰
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # wrangler는 정확한 버전으로 고정 (latest 금지 — npm 공급망 방어)
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN 미등록 — 배포 건너뜀 (수집·커밋은 정상 완료)"
            exit 0
          fi
          # workers.dev 하위도메인: 'superstock'으로 통일 시도 (선점 시 기존 유지)
          API="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain"
          CUR=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "$API")
          if ! echo "$CUR" | grep -q '"subdomain":"superstock"'; then
            echo "하위도메인 변경 시도: superstock"
            curl -s -X PUT -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"subdomain":"superstock"}' "$API"
            echo
          fi
          npx --yes wrangler@4.107.0 deploy
          # 구 워커(superstock-blog) 정리 — 없으면 무시
          curl -s -X DELETE -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/superstock-blog" >/dev/null || true
